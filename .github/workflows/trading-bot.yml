name: Crypto Trading Bot (manual only — bot now runs locally)

# The trading scan runs on the laptop via Windows Task Scheduler.
# This workflow is kept only as a manual fallback (Actions tab → Run workflow).
on:
  workflow_dispatch:

concurrency:
  group: bot-state
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Needed to commit state files back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot scan
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_SECRET_KEY: ${{ secrets.BINANCE_SECRET_KEY }}
          PAPER_TRADING: ${{ secrets.PAPER_TRADING }}
          STARTING_BALANCE: '500'
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SCAN_INTERVAL_MINUTES: '30'
        run: python run_once.py

      - name: Save state back to repo
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@trading-agent.com"
          git add risk_state.json trades.csv
          if git diff --staged --quiet; then
            echo "No state changes."
            exit 0
          fi
          git commit -m "Bot state update $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git push && exit 0
            echo "Push failed, rebasing and retrying ($i/3)..."
            git pull --rebase
          done
          git push
