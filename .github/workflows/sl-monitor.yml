name: SL/TP Monitor (Every 5 Min)

on:
  schedule:
    - cron: '*/5 * * * *'    # Every 5 minutes — fast stop-loss protection
  workflow_dispatch:           # Manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Check SL/TP (no pip install needed)
        run: python3 sl_monitor.py

      - name: Save state if changed
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@trading-agent.com"
          git add risk_state.json trades.csv || true
          git diff --staged --quiet || git commit -m "SL/TP triggered $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
